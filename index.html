<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>GWM Tank 300 Charge-or-Fill</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial; background: #0f172a; color: white; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { max-width: 450px; margin: auto; background: #1e293b; padding: 16px 20px 20px; border-radius: 12px; }
        h1 { text-align: center; color: #22c55e; font-size: clamp(18px, 6vw, 24px); white-space: nowrap; margin: 0 0 14px; }
        label { display: block; margin-top: 12px; color: #cbd5e1; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; margin-top: 20px; padding: 12px; background: #22c55e; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
        button.toggle { background: #334155; font-size: 15px; margin-top: 20px; font-weight: bold; color: #ffffff; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .arrow { color: #22c55e; font-size: 20px; line-height: 1; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 10px; }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .fuellink { display: block; margin-top: 4px; color: #22c55e; text-decoration: none; font-size: 12px; }
        .section-title { font-weight: bold; color: #cbd5e1; margin-top: 20px; margin-bottom: 12px; }
        .subsection { margin-top: 16px; padding-top: 16px; border-top: 1px solid #334155; }
        .hidden { display: none; }
        .installline { text-align: center; font-size: 12px; margin-top: 18px; }
        .installline a { color: #94a3b8; text-decoration: none; }
        .green { color: #22c55e; } .red { color: #ef4444; } .yellow { color: #facc15; }
        .modeRow { display: flex; gap: 8px; margin-top: 5px; }
        .modeBtn { flex: 1; padding: 10px 4px; margin-top: 0; background: #ffffff; color: #0f172a; border-radius: 8px; font-size: 14px; font-weight: bold; text-align: center; cursor: pointer; border: 2px solid #334155; }
        .modeBtn.selected { background: #22c55e; color: #ffffff; border-color: #22c55e; }
        .modeHighlight { background: #22c55e; color: #0f172a; padding: 4px 10px; border-radius: 6px; font-weight: bold; display: inline-block; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>GWM Tank 300 Charge-or-Fill</h1>
    
    <div id="planSection">
        <div class="section-title">Plan your trip</div>
        <label>Petrol Consumption (L/100km)</label>
        <input id="fuelUse" type="number" value="8.3" step="0.1">
        <div class="hint">Brochure figure is 8.3 — type your own if you know it.</div>
        <label>91 Petrol Price ($/L)</label>
        <input id="petrolPrice" type="number" value="2.70" step="0.01">
        <a class="fuellink" href="https://petrolmate.com.au/" rel="noopener">Check cheapest fuel near you (AU &amp; NZ) →</a>
        <label>Home Electricity Price (¢/kWh)</label>
        <input id="homePrice" type="number" value="20" step="1">
        <label>Public Charger Electricity Price (¢/kWh)</label>
        <input id="chargerPrice" type="number" value="40" step="1">
        <button onclick="calc()" style="background: #22c55e;">Calculate</button>
        <div class="result" id="out"></div>
    </div>

    <button class="toggle" onclick="toggleTripLog()"><span>Trip cost calculator (actual)</span><span class="arrow" id="tripArrow">↓</span></button>
    <div id="tripLogSection" class="hidden">
        <div class="section-title">Calculate the cost of a completed trip</div>

        <label>Trip name</label>
        <input id="tripName" type="text" placeholder="e.g. Napier to Wairoa">
        
        <div class="subsection">
            <div class="section-title">Start of trip</div>
            <label>Available petrol kilometers</label>
            <input id="petrolStartKm" type="number" value="400" step="1">
            <label>Available EV kilometers</label>
            <input id="evStartKm" type="number" value="158" step="1">
            <label>Odometer reading (km)</label>
            <input id="odomStart" type="number" value="0" step="1">
            <label>What did you use to charge the battery before trip?</label>
            <select id="chargeType">
                <option value="home">Home charging (cheaper)</option>
                <option value="public">Public charging (more expensive)</option>
            </select>
            <label>Method of travel</label>
            <div class="modeRow">
                <div class="modeBtn selected" id="modeEV" onclick="selectMode('EV')">EV</div>
                <div class="modeBtn" id="modeHEV" onclick="selectMode('HEV')">HEV</div>
                <div class="modeBtn" id="modeIntelligent" onclick="selectMode('Intelligent')">Intelligent</div>
            </div>
            <input type="hidden" id="travelMode" value="EV">
        </div>

        <div class="subsection">
            <div class="section-title">End of trip</div>
            <label>Available petrol kilometers</label>
            <input id="petrolEndKm" type="number" value="380" step="1">
            <label>Available EV kilometers</label>
            <input id="evEndKm" type="number" value="50" step="1">
            <label>Odometer reading (km)</label>
            <input id="odomEnd" type="number" value="0" step="1">
            <label>$ spent on Public EV charging on this trip</label>
            <input id="evSpent" type="number" value="0" step="0.01">
            <label>$ spent on petrol on this trip</label>
            <input id="petrolSpent" type="number" value="0" step="0.01">
        </div>

        <button onclick="calcTrip()" style="background: #22c55e;">Calculate Trip Cost</button>
        <div class="result" id="tripOut"></div>
        <button id="screenshotBtn" onclick="takeScreenshot()" style="background: #334155; display: none;">📸 Click here to screenshot results</button>
    </div>

    <div class="installline" id="installLine"><a href="#" onclick="installApp(event)">Tap here to install this app on your phone</a></div>
</div>

<script>
    const FIELDS = ['fuelUse','petrolPrice','homePrice','chargerPrice','tripName','petrolStartKm','evStartKm','odomStart','chargeType','travelMode','petrolEndKm','evEndKm','odomEnd','evSpent','petrolSpent'];
    function saveSettings() {
        try {
            const data = {};
            FIELDS.forEach(id => data[id] = document.getElementById(id).value);
            localStorage.setItem('tank300Settings', JSON.stringify(data));
        } catch (e) {}
    }
    function loadSettings() {
        try {
            const raw = localStorage.getItem('tank300Settings');
            if (raw) {
                const data = JSON.parse(raw);
                FIELDS.forEach(id => { if (data[id] != null) document.getElementById(id).value = data[id]; });
                if (data.travelMode) selectMode(data.travelMode);
            }
        } catch (e) {}
        calc();
        calcTrip();
    }

    function selectMode(mode) {
        document.getElementById('travelMode').value = mode;
        ['EV','HEV','Intelligent'].forEach(m => {
            document.getElementById('mode' + m).classList.toggle('selected', m === mode);
        });
        saveSettings();
    }

    function calc() {
        const fuelUse = parseFloat(document.getElementById('fuelUse').value);
        const evUse = 32.54;
        let petrol = parseFloat(document.getElementById('petrolPrice').value);
        let home = parseFloat(document.getElementById('homePrice').value);
        let charger = parseFloat(document.getElementById('chargerPrice').value);
        let petrolCost = fuelUse * petrol;
        let evHomeCost = evUse * (home / 100);
        let evChargerCost = evUse * (charger / 100);
        let breakEven = (fuelUse * petrol) / evUse * 100;
        let msg = "";
        if (home < breakEven && charger < breakEven) {
            msg = "<span class='green'>🟢 Both home and public charging are cheaper than petrol</span>";
        } else if (home < breakEven && charger >= breakEven) {
            msg = "<span class='yellow'>🟡 Home charging is cheaper, public charging is not. Use Petrol away from home</span>";
        } else {
            msg = "<span class='red'>🔴 Petrol is cheaper than both charging options</span>";
        }
        document.getElementById('out').innerHTML = `
            <b>Cost Comparison (per 100 km)</b><br><br>
            ⛽ Petrol (${fuelUse} L/100km): <b>$${petrolCost.toFixed(2)}</b><br>
            🔌 Home EV cost: <b>$${evHomeCost.toFixed(2)}</b><br>
            ⚡ Public EV cost: <b>$${evChargerCost.toFixed(2)}</b><br><br>
            Break-even electricity price:<br>
            <b>${breakEven.toFixed(1)} ¢/kWh</b><br><br>
            ${msg}
        `;
        saveSettings();
    }

    function toggleTripLog() {
        const section = document.getElementById('tripLogSection');
        section.classList.toggle('hidden');
        const arrow = document.getElementById('tripArrow');
        arrow.textContent = section.classList.contains('hidden') ? '↓' : '↑';
    }

    function calcTrip() {
        const tripName = document.getElementById('tripName').value || 'your trip';
        const odomStart = parseFloat(document.getElementById('odomStart').value);
        const odomEnd = parseFloat(document.getElementById('odomEnd').value);
        const petrolStartKm = parseFloat(document.getElementById('petrolStartKm').value);
        const petrolEndKm = parseFloat(document.getElementById('petrolEndKm').value);
        const evStartKm = parseFloat(document.getElementById('evStartKm').value);
        const evEndKm = parseFloat(document.getElementById('evEndKm').value);
        const chargeType = document.getElementById('chargeType').value;
        const travelMode = document.getElementById('travelMode').value;
        const evSpent = parseFloat(document.getElementById('evSpent').value);
        const petrolSpent = parseFloat(document.getElementById('petrolSpent').value);

        const fuelUse = parseFloat(document.getElementById('fuelUse').value);
        const petrolPrice = parseFloat(document.getElementById('petrolPrice').value);
        const homePrice = parseFloat(document.getElementById('homePrice').value);
        const chargerPrice = parseFloat(document.getElementById('chargerPrice').value);
        const chargePrice = chargeType === 'home' ? homePrice : chargerPrice;
        const chargeMethod = chargeType === 'home' ? 'Home charging' : 'Public charging';

        const petrolKmUsed = petrolStartKm - petrolEndKm;
        const evKmUsed = evStartKm - evEndKm;
        const odomKmUsed = odomEnd - odomStart;

        const evKmEquivalent = evSpent > 0 ? (evSpent / ((chargerPrice / 100) * 32.54 / 100)) : 0;
        const petrolKmEquivalent = petrolSpent > 0 ? (petrolSpent / ((petrolPrice * fuelUse) / 100)) : 0;

        const totalKmTheoretical = petrolKmUsed + evKmUsed + evKmEquivalent + petrolKmEquivalent;

        const petrolCostCalc = (petrolKmUsed * fuelUse / 100) * petrolPrice;
        const evCostCalc = (evKmUsed / 100 * 32.54) * (chargePrice / 100);
        const totalCost = petrolCostCalc + petrolSpent + evCostCalc + evSpent;

        const costPer100km = odomKmUsed > 0 ? (totalCost / odomKmUsed) * 100 : 0;

        document.getElementById('tripOut').innerHTML = `
            <b>Trip Summary for ${tripName}</b><br><br>
            📍 Petrol distance: <b>${petrolKmUsed} km</b> (flat, theoretical)<br>
            ⚡ EV distance: <b>${evKmUsed} km</b> (flat, theoretical)<br><br>
            🔌 EV charging (${chargeMethod}): <b>$${evSpent.toFixed(2)}</b> ≈ <b>${evKmEquivalent.toFixed(0)} km</b> (flat, theoretical)<br>
            ⛽ Petrol: <b>$${petrolSpent.toFixed(2)}</b> ≈ <b>${petrolKmEquivalent.toFixed(0)} km</b> (flat, theoretical)<br><br>
            🛣️ Total approximate km (calculated from petrol and EV distances): <b>${totalKmTheoretical.toFixed(0)} km</b><br>
            🚗 Total actual km (from odometer): <b>${odomKmUsed} km</b><br><br>
            💰 Actual total cost: <b>$${totalCost.toFixed(2)}</b><br>
            💵 Cost per 100 km (odometer): <b>$${costPer100km.toFixed(2)}</b>
            <div class="modeHighlight">Travelling in: ${travelMode} mode</div>
        `;
        document.getElementById('screenshotBtn').style.display = 'block';
    }

    function takeScreenshot() {
        const resultBox = document.getElementById('tripOut');
        html2canvas(resultBox, { backgroundColor: '#0f172a' }).then(canvas => {
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'trip-cost-result.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            });
        });
    }

    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });
    async function installApp(ev) {
        ev.preventDefault();
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        } else {
            const ua = navigator.userAgent.toLowerCase();
            const isIOS = /iphone|ipad|ipod/.test(ua);
            const isSamsung = /samsungbrowser/.test(ua);
            const isFirefox = /firefox/.test(ua);
            const isFacebook = /fban|fbav|instagram/.test(ua);
            if (isFacebook) {
                alert('To install this app: tap the three dots (⋮) in the top right, tap "Open in Chrome", then tap "Install app".');
            } else if (isIOS) {
                alert('To install on iPhone: tap the Share button (box with arrow), then "Add to Home Screen".');
            } else if (isSamsung) {
                alert('To install on Samsung: tap the menu button (⋮), then tap "Add page to" and confirm.');
            } else if (isFirefox) {
                alert('To install on Firefox: tap the menu button (⋮), scroll down and tap "Install".');
            } else {
                alert('To install: tap your browser menu (⋮) and choose "Add to Home screen" or "Install app".');
            }
        }
    }
    window.addEventListener('appinstalled', () => {
        const el = document.getElementById('installLine');
        if (el) el.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
    window.addEventListener('DOMContentLoaded', () => {
        FIELDS.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', saveSettings);
            el.addEventListener('change', saveSettings);
        });
        const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (standalone) { const il = document.getElementById('installLine'); if (il) il.style.display = 'none'; }
        loadSettings();
    });
</script>
</body>
</html>
